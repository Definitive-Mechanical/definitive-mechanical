<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Licensed Plumbing in MD, DC & Northern VA | Definitive Mechanical</title>
    <meta name="description" content="Definitive Mechanical provides licensed plumbing, gas, emergency, commercial & residential service across MD, DC & Northern VA. 24/7. MDOT MBE & VA SWaM Certified. Call (301) 679-5849." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://definitivemechanical.com/" />

    <!-- Google Fonts: single consolidated stylesheet for the 4 families the CSS variables reference -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Licensed Plumbing in MD, DC & Northern VA | Definitive Mechanical" />
    <meta property="og:description" content="MDOT MBE & VA SWaM Certified. Master Plumber licensed in 4 states. 24/7 emergency service. Call (301) 679-5849." />
    <meta property="og:url" content="https://definitivemechanical.com/" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Preload the LCP hero image so it isn't gated behind the JS bundle -->
    <link rel="preload" as="image" href="/images/main-hero-plumbing-image.webp" fetchpriority="high" />

    <!-- Non-blocking Google Fonts: preload + media=print onload swap. With `display=swap`
         already in the URL, text renders in the system fallback first, then upgrades when
         the webfont arrives — no FCP delay from a blocking stylesheet round-trip. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Playfair+Display:wght@600;700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Playfair+Display:wght@600;700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Playfair+Display:wght@600;700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" /></noscript>
</head>
  <body>
    <!--
      Hidden forms below are required for Netlify Forms detection on this React SPA.
      Netlify scans the built index.html for forms at deploy time. The actual React
      forms POST to "/" with form-name set to match one of these. Do not remove.
    -->
    <form name="home-hero-quote" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <input type="text" name="city" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="contact-form" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <input type="text" name="city" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
